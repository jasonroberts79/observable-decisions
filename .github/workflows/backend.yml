name: Backend - AzFn

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/backend.yml"
      - "*.ts"
      - "*.js"
      - "*.html"
      - "*.mjs"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  AZURE_SWA_NAME: ${{ vars.AZURE_SWA_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
jobs:
  deploy_api:
    name: Deploy API to Azure Functions
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Prepare
        run: |
          uv export --no-dev --no-annotate --no-hashes --no-header > requirements.txt
          rm -rf tests/
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: api
          remote-build: true
      - name: Link to front-end
        shell: pwsh
        run: |
          $swa = az staticwebapp backends show -n ${{ env.AZURE_SWA_NAME }} -g ${{ env.AZURE_RESOURCE_GROUP }} | ConvertFrom-Json
          $funcApp = az functionapp show -n ${{ env.AZURE_FUNCTIONAPP_NAME }} -g ${{ env.AZURE_RESOURCE_GROUP }} | ConvertFrom-Json
          if($null -eq $swa -or $swa.backendResourceId -ne $funcApp.id) {
            az staticwebapp backends unlink `
              --name ${{ env.AZURE_SWA_NAME }} `
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} `
            az staticwebapp backends link `
              --name ${{ env.AZURE_SWA_NAME }} `
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} `
              --backend-resource-id $funcApp.id `
              --backend-region eastus2
          }

  test_api:
    name: Lint & Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short