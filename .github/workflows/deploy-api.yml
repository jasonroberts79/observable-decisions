name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}

jobs:
#   # -----------------------------------------------------------------------
#   # 1. Lint & test
#   # -----------------------------------------------------------------------
#   test:
#     name: Lint & Test
#     runs-on: ubuntu-latest
#     defaults:
#       run:
#         working-directory: api

#     steps:
#       - uses: actions/checkout@v4
      
#       - name: Install uv
#         uses: astral-sh/setup-uv@v7

#       - name: Set up Python
#         run: uv python install
      
#       - name: Install dependencies
#         run: uv sync

#       - name: Run tests
#         run: uv run pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # 2. Build & deploy (only on push to main)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Functions
    #needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    permissions:
      id-token: write   # for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install
      
      - name: Install dependencies
        run: |
          uv sync --no-dev --link-mode=copy
          ren .venv .python-packages

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: api
